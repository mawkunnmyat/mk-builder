<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Shwe Myanmar Foodstuff Industry — natural flavor, premium quality food products from Mandalay, Myanmar."
    />
    <meta property="og:title" content="Shwe Myanmar | Home" />
    <meta
      property="og:description"
      content="သဘာဝ အနံ့ သဘာဝ အရသာ — Premium butter and ghee from Mandalay, Myanmar."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="../assets/brand/logo-preview.png" />
    <title>Shwe Myanmar | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/app.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Shwe Myanmar Foodstuff Industry",
        "brand": { "@type": "Brand", "name": "Shwe Myanmar" },
        "description": "Premium butter and ghee from Mandalay, Myanmar. Natural scent, natural taste.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Mandalay",
          "addressCountry": "MM"
        },
        "telephone": ["+95-2-55122", "+95-2-55123", "+95-9-2001227"]
      }
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="header" data-block="twork/brand-header" data-version="1" data-component="header"></header>

    <main id="main-content" class="l-page" data-page="home">
      <section class="hero" data-block="twork/hero-banner-carousel" data-version="1" data-component="hero" aria-label="Hero"></section>

      <section
        id="services"
        class="services-carousel"
        data-block="twork/image-card-carousel"
        data-version="1"
        data-component="services-carousel"
        aria-label="Our services"
      ></section>

      <section
        class="why-choose-us"
        data-block="twork/numbered-features-grid"
        data-version="1"
        data-component="why-choose-us"
        aria-label="Why choose us"
      ></section>

      <section
        id="categories"
        class="product-categories"
        data-block="twork/category-card-grid"
        data-version="1"
        data-component="product-categories"
        aria-label="Product categories"
      ></section>

      <section
        id="partners"
        class="partners"
        data-block="twork/logo-showcase-section"
        data-version="1"
        data-component="partners"
        aria-label="Partners"
      ></section>

      <section
        id="blog"
        class="blog-news"
        data-block="twork/news-card-grid"
        data-version="1"
        data-component="blog-news"
        aria-label="Latest news"
      ></section>

      <section
        class="testimonials"
        data-block="twork/review-carousel"
        data-version="1"
        data-component="testimonials"
        aria-label="Testimonials"
      ></section>

      <section
        class="app-promo"
        data-block="twork/split-promo-section"
        data-version="1"
        data-component="app-promo"
        aria-label="Mobile app"
      ></section>

      <section
        id="faq"
        class="faq"
        data-block="twork/faq-accordion-section"
        data-version="1"
        data-component="faq"
        aria-label="FAQ"
      ></section>

      <section
        class="newsletter"
        data-block="twork/subscribe-bar"
        data-version="1"
        data-component="newsletter"
        aria-label="Newsletter"
      ></section>
    </main>

    <footer
      id="footer"
      class="footer"
      data-block="twork/brand-footer"
      data-version="1"
      data-component="footer"
    ></footer>
    <script type="module" src="../scripts/app.js"></script>
  </body>
</html>
